name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  python-smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: python -m pip install --upgrade pip

      - run: pip install -r requirements.txt

      - run: python -m compileall .

      - run: python -m pytest tests -q
