server:
  host: 127.0.0.1
  port: 8000
  max_concurrent_jobs: 10
  queue_enabled: true
  job_timeout_seconds: 0  # 0/none/unlimited disables Codex turn timeout
  codex_session_start_timeout_seconds: 180  # fail only if Codex starts but no JSON session appears
  stale_running_job_grace_seconds: 5
  job_cleanup_after_hours: 24
  max_request_bytes: 1048576
  enable_cors: false
  allowed_origins:
    - http://127.0.0.1:3000
    - http://localhost:3000

app:
  widget_domain: https://web-sandbox.oaiusercontent.com
  tool_mode: worker

auth:
  enabled: false
  token_env: PATCHBAY_HTTP_TOKEN
  allow_query_token: true
  query_token_names:
    - patchbay_token
    - token
  require_for_non_loopback: true
  require_for_tunnel: true
  tunnel_mode: none

ownership:
  # token: same bearer/query token is one coordination owner; if no token is
  # present, fall back to one shared server owner for local single-user runs.
  scope: token

tunnel:
  hostname: ""
  tunnel_name: ""
  cloudflared: cloudflared
  ngrok: ngrok
  cloudflare_config: ""
  cloudflare_token_file: ""
  cloudflare_token_env: CLOUDFLARE_TUNNEL_TOKEN
  ngrok_config: ""
  timeout_seconds: 45

repositories:
  projects_base: /
  default: /
  allowed:
    - /
  # Optional canonical-to-local workspace mappings. Use this when a remote
  # PatchBay host works from a mounted or copied checkout but ChatGPT tasks name
  # the operator's canonical path.
  # aliases:
  #   - canonical: /operator/canonical/workspace
  #     local: /srv/workspace-copy
  #     description: Remote copy of the canonical workspace

security:
  require_git_repo: false
  default_sandbox: danger-full-access
  allow_dangerously_bypass: true
  allowed_env_keys:
    - "*"
  allowed_config_override_prefixes:
    - ""
  context_dir: .ai-bridge
  max_read_bytes: 200000
  max_write_bytes: 500000
  max_diff_bytes: 200000
  max_search_results: 100
  max_tree_entries: 500
  max_skill_count: 120
  max_skill_bytes: 40000
  blocked_globs: []

power_tools:
  direct_write: true
  bash_mode: "full"
  bash_transcript: compact
  bash_session_id: ""
  require_bash_session: false
  bash_timeout_ms: 180000
  bash_max_output_bytes: 500000
  codex_session_read: true
  codex_home: "~/.codex"
  codex_session_max_messages: 80
  codex_session_max_bytes: 80000
  codex_session_max_file_bytes: 20000000
  codex_session_max_scan_files: 3000
  codex_session_max_scan_depth: 6

workers:
  worktree_root: ""
  ignore_user_config: false
  file_response_max_bytes: 25000
  heartbeat_fresh_seconds: 120
  heartbeat_quiet_seconds: 600
  stop_artifact_wait_seconds: 2

artifacts:
  enabled: true
  root:
  allowed_download_schemes:
    - http
    - https
  download_timeout_seconds: 60
  max_archive_bytes:
  max_unpacked_bytes:
  max_file_count:
  max_single_file_bytes:

pro_requests:
  root:
  mirror_enabled: true
  mirror_dir: ".ai-bridge/pro-requests"
  max_report_bytes: 200000
  max_response_bytes: 200000
  max_attachment_bytes: 2000000
  max_attachments_per_request: 10
  retention_days: 30

logging:
  level: INFO
  audit_file:
  job_logs_dir:
  job_state_dir:
  job_log_max_bytes: 200000
  write_raw_job_logs: false
  access_log: false
  log_prompt_bodies: false
  log_response_bodies: false
