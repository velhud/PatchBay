server:
  host: 127.0.0.1
  port: 8000
  max_concurrent_jobs: 10
  queue_enabled: true
  job_timeout_seconds: 0  # 0/none/unlimited disables Codex turn timeout
  codex_session_start_timeout_seconds: 180  # fail only if Codex starts but no JSON session appears
  codex_post_completion_exit_grace_seconds: 2  # wrapper cleanup only after an authoritative terminal event
  codex_post_completion_cleanup_timeout_seconds: 3  # bound pipe/process cleanup after the final report is durable
  codex_startup_serialization_enabled: true  # serialize auth/session startup only; full turns still run concurrently
  stale_running_job_grace_seconds: 600  # restart/stale reconciliation window; not a worker turn timeout
  job_cleanup_after_hours: 24
  max_request_bytes: 16777216
  enable_cors: false
  allowed_origins:
    - http://127.0.0.1:3000
    - http://localhost:3000

app:
  widget_domain: https://web-sandbox.oaiusercontent.com
  tool_mode: worker
  tool_cards: false

auth:
  enabled: false
  token_env: PATCHBAY_HTTP_TOKEN
  allow_query_token: true
  query_token_names:
    - patchbay_token
    - token
  require_for_non_loopback: true
  require_for_tunnel: true
  tunnel_mode: none

ownership:
  # token: same bearer/query token is one coordination owner; if no token is
  # present, fall back to one shared server owner for local single-user runs.
  scope: token

hub:
  # The shipped Hub example selects the complete 31-tool V2 control plane.
  # Set this explicitly to v1 only when operating a legacy deployment.
  control_plane: v2
  # Private multi-machine Hub/Edge runtime state. Blank paths resolve under
  # PATCHBAY_HOME/runtime/hub/ and are not repository data. state_file is the
  # legacy V1 store; V2 uses state_db.
  state_file:
  state_db:
  # Deployment continuity guards. Keep false/blank only for first-time setup;
  # production should require the existing database and pin its known Hub id.
  require_existing_state: false
  expected_hub_id:
  # Optional explicit migration marker; blank uses the marker beside state_db.
  pre_migration_backup_marker:
  heartbeat_stale_seconds: 90
  max_events: 1000
  edge:
    # Set true after the first journal has been created. A production Edge then
    # refuses a missing/misbound journal instead of starting empty state.
    require_existing_journal: false
    journal_file:
    pre_migration_backup_marker:
  # The Hub process, rather than read/status calls, reoffers durable
  # dispatchable operations left behind by a crash or restart.
  recovery_dispatch_interval_seconds: 1.0
  recovery_dispatch_batch_size: 100
  routing:
    enabled: false
    min_disk_free_bytes: 2147483648
    allow_queue_when_full: false
    weights:
      worker_ratio: 0.60
      memory_ratio: 0.20
      cpu_ratio: 0.20

tunnel:
  hostname: ""
  tunnel_name: ""
  cloudflared: cloudflared
  ngrok: ngrok
  cloudflare_config: ""
  cloudflare_token_file: ""
  cloudflare_token_env: CLOUDFLARE_TUNNEL_TOKEN
  ngrok_config: ""
  timeout_seconds: 45

repositories:
  projects_base: /
  default: /
  allowed:
    - /
  # Optional canonical-to-local workspace mappings. Use this when a remote
  # PatchBay host works from a mounted or copied checkout but ChatGPT tasks name
  # the operator's canonical path.
  # aliases:
  #   - canonical: /operator/canonical/workspace
  #     local: /srv/workspace-copy
  #     description: Remote copy of the canonical workspace
  # Optional shallow discovery roots for codex_list_workspaces. Use these to
  # expose known multi-repo folders without forcing ChatGPT to guess paths.
  discovery_roots: []
  max_discovery_depth: 3
  max_discovery_results: 50

security:
  require_git_repo: false
  default_sandbox: danger-full-access
  allow_dangerously_bypass: true
  allowed_env_keys:
    - "*"
  allowed_config_override_prefixes:
    - ""
  context_dir: .ai-bridge
  max_read_bytes: 5000000
  max_write_bytes: 10000000
  max_diff_bytes: 5000000
  max_search_results: 1000
  search_timeout_ms: 30000
  max_search_timeout_ms: 300000
  max_tree_entries: 5000
  max_skill_count: 500
  max_skill_bytes: 200000
  blocked_globs: []

power_tools:
  direct_write: true
  bash_mode: "full"
  bash_transcript: compact
  bash_session_id: ""
  require_bash_session: false
  bash_timeout_ms: 1800000
  bash_max_output_bytes: 5000000
  codex_session_read: true
  codex_home: "~/.codex"
  codex_session_max_messages: 80
  codex_session_max_bytes: 80000
  codex_session_max_file_bytes: 20000000
  codex_session_max_scan_files: 3000
  codex_session_max_scan_depth: 6

workers:
  worktree_root: ""
  ignore_user_config: false
  file_response_max_bytes: 1000000
  heartbeat_fresh_seconds: 120
  heartbeat_quiet_seconds: 600
  status_recommended_poll_seconds: 30
  status_minimum_poll_seconds: 20
  stop_artifact_wait_seconds: 2
  stop_confirmation_grace_seconds: 300

artifacts:
  enabled: true
  root:
  allowed_download_schemes:
    - http
    - https
  download_timeout_seconds: 60
  max_archive_bytes:
  max_unpacked_bytes:
  max_file_count:
  max_single_file_bytes:

pro_requests:
  root:
  mirror_enabled: true
  mirror_dir: ".ai-bridge/pro-requests"
  max_report_bytes: 200000
  max_response_bytes: 200000
  max_attachment_bytes: 2000000
  max_attachments_per_request: 10
  retention_days: 30

logging:
  level: INFO
  audit_file:
  job_logs_dir:
  job_state_dir:
  private_evidence_dir:
  job_log_max_bytes: 200000
  # In-memory subprocess output is a bounded tail, not an unbounded transcript.
  # Oversized JSONL events are drained without blocking the Codex process.
  process_capture_max_bytes: 4000000
  process_event_line_max_bytes: 8000000
  write_raw_job_logs: false
  access_log: false
  private_evidence_log: false
  store_job_prompts: false
  store_mcp_transcripts: false
  log_prompt_bodies: false
  log_response_bodies: false
