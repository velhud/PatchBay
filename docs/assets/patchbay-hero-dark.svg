<svg width="1120" height="360" viewBox="0 0 1120 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">PatchBay workflow</title>
  <desc id="desc">ChatGPT context flows through PatchBay into local Codex workers, then reports, diffs, tests, and integration return for review.</desc>
  <rect width="1120" height="360" rx="32" fill="#020617"/>
  <rect x="24" y="24" width="1072" height="312" rx="28" fill="#0F172A" stroke="#334155"/>
  <text x="560" y="68" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="24" font-weight="700" fill="#F8FAFC">ChatGPT as control room · Codex as local execution</text>
  <text x="560" y="98" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="14" fill="#CBD5E1">PatchBay routes context, worker briefs, reports, diffs, and accepted integrations through a local MCP bridge.</text>

  <g transform="translate(62 142)">
    <rect width="210" height="116" rx="18" fill="#1E1B4B" stroke="#818CF8"/>
    <text x="105" y="38" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui" font-size="18" font-weight="700" fill="#E0E7FF">ChatGPT</text>
    <text x="105" y="66" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui" font-size="13" fill="#C7D2FE">project context</text>
    <text x="105" y="88" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui" font-size="13" fill="#C7D2FE">planning · memory · files</text>
  </g>

  <path d="M292 200 H388" stroke="#94A3B8" stroke-width="3" stroke-linecap="round"/>
  <path d="M376 190 L392 200 L376 210" stroke="#94A3B8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(408 128)">
    <rect width="304" height="144" rx="22" fill="#164E63" stroke="#22D3EE"/>
    <text x="152" y="38" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui" font-size="21" font-weight="800" fill="#ECFEFF">PatchBay</text>
    <text x="152" y="68" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui" font-size="14" fill="#A5F3FC">local MCP bridge</text>
    <rect x="38" y="88" width="228" height="32" rx="16" fill="#083344" stroke="#0E7490"/>
    <text x="152" y="109" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui" font-size="13" fill="#CFFAFE">workers · artifacts · diffs · integration</text>
  </g>

  <path d="M732 200 H828" stroke="#94A3B8" stroke-width="3" stroke-linecap="round"/>
  <path d="M816 190 L832 200 L816 210" stroke="#94A3B8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(852 96)">
    <rect width="208" height="54" rx="14" fill="#052E16" stroke="#22C55E"/>
    <text x="104" y="24" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui" font-size="14" font-weight="700" fill="#DCFCE7">Investigator</text>
    <text x="104" y="42" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui" font-size="12" fill="#86EFAC">finds structure + risks</text>

    <rect y="72" width="208" height="54" rx="14" fill="#052E16" stroke="#22C55E"/>
    <text x="104" y="96" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui" font-size="14" font-weight="700" fill="#DCFCE7">Implementer</text>
    <text x="104" y="114" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui" font-size="12" fill="#86EFAC">edits in worktree</text>

    <rect y="144" width="208" height="54" rx="14" fill="#052E16" stroke="#22C55E"/>
    <text x="104" y="168" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui" font-size="14" font-weight="700" fill="#DCFCE7">Reviewer</text>
    <text x="104" y="186" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui" font-size="12" fill="#86EFAC">checks diffs + tests</text>
  </g>

  <g transform="translate(296 298)">
    <rect width="528" height="34" rx="17" fill="#1E293B" stroke="#334155"/>
    <text x="264" y="22" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui" font-size="13" fill="#CBD5E1">Reports · changed files · one-file diffs · test notes · explicit human-approved integration</text>
  </g>
</svg>
